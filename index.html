<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>トーク・デリバリー -オンライン会議の発言支援アプリ-</title>
        <link rel="stylesheet" href="CSS/style.css">
        <link rel="icon" href="images/Talk Takkyubun.png">
    </head>

    <body>

    <div class="main">
        <!--親ブロックの設定（container）-->
            <div class="main-container">
                <!--左画面-->
                <div class="left">
                    <!--音声合成機能選択-->
                    <label for="voiceType">音声合成機能:</label>
                    <select id="voiceType">
                        <option value="TTS-PunctuationMark">句読点（文章読みモード）</option>
                        <option value="TTS-Kanjichange">漢字変換（単語読みモード）</option>
                        <option value="TTS-1charTextReading">1文字（タイピング読みモード）</option>
                    </select>
                    <!--発言入力画面-->
                    <div class="Contribution">
                        <textarea id="Chat" name="Chatinput" placeholder="ここにテキストを入力し、Enterキーを2回押すとテキストが削除"></textarea>
                    </div>
                    <!--読み上げテキスト表示領域-->
                    <!-- <div id="displayArea"></div> -->
                </div>
        
                <!--右画面-->
                <div class="right">
                    <!--カメラ起動-->
                    <div class="Camera">
                        <video id="video" playsinline></video>
                    </div>

                        <div id="ModeDisplay">通知音モード</div>
                    </div> -->

                    <!-- </select> -->
                    <!--呼びかけボタンの実装-->
                    <!-- <div id="ControlContainer"> -->
                        <!-- <button id="Calling">呼びかけ</button> -->
                    <!-- </div> -->
                </div>
            </div>
             <div class="container">
                <!--発言ログ表示領域 & 読み上げテキスト表示領域-->
                <div class="log-section" id="logArea"></div>
            </div>
    </div>

        <script src="main.js"></script>
        <script src="scale-manager.js"></script>
    </body>
</html>
