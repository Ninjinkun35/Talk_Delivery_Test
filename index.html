<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>トーク・デリバリー -オンライン会議の発言支援アプリ-</title>
        <link rel="stylesheet" href="CSS/style.css">
        <link rel="icon" href="images/Talk Takkyubun.png">
    </head>

    <body>
        <!--ハンバーガーメニューの実装-->

            <div class="header_container">
                <img src="images/Talk Takkyubun.png" class="header_image">
                <h1 class="header_container">トーク・デリバリー -オンライン会議の発言支援アプリ-</h1>
            </div>

    <div class="main">
        <!--親ブロックの設定（container）-->
            <div class="main-container">
                <!--左画面-->
                <div class="left">
                    <div class="control-row">
                        <div class="voice-control">
                            <!--音声合成機能選択-->
                            <label for="voiceType">音声合成機能:</label>
                            <select id="voiceType">
                                <option value="TTS-PunctuationMark">句読点（文章読みモード）</option>
                                <option value="TTS-Kanjichange">漢字変換（単語読みモード）</option>
                                <option value="TTS-1charTextReading">1文字（タイピング読みモード）</option>
                            </select>
                        </div>
                        <div class="font-control">
                                <label for="fontSizeRange">テキストサイズ：<span id="fontSizeValue">72</span></label>
                                <input type="range" id="fontSizeRange" min="50" max="100" value="72">
                        </div>
                    </div>
                    <!--発言入力画面-->
                    <div class="Contribution">
                        <textarea id="Chat" name="Chatinput" placeholder="ここにテキストを入力し、「Shift」キーと「Enter」キーを同時に押すとテキストが削除"></textarea>
                    </div>
                    <!--読み上げテキスト表示領域-->
                    <!-- <div id="displayArea"></div> -->
                </div>
        
        
                <!--右画面-->
                <div class="right">
                    <!--カメラ起動-->
                    <div class="Camera">
                        <video id="video" playsinline></video>
                    </div>
                    <!--相槌ボタン-->
                    <!-- <div class="reaction-buttons">
                        <button class="reaction-btn" data-text="たしかに">確かに</button>
                        <button class="reaction-btn" data-text="そうですね">そうですね</button>
                        <button class="reaction-btn" data-text="なるほど">なるほど</button>
                    </div>         -->
                    <!-- <div>
                        <div id="ModeDisplay">通知音モード</div>
                    </div> -->
                    <!--呼びかけモードの設定-->
                    <!-- <label id="CallingTitle">呼びかけモードの設定</label> -->
                    <!-- <select id="CallingType"> -->
                        <!-- <option value="ModeDisplay">通知音モード</option> -->
                        <!-- <option value="TextDisplay">今いいですか？モード</option> -->
                        <!-- <option value="BlinkMode">点滅モード</option> -->
                    <!-- </select> -->
                    <!--呼びかけボタンの実装-->
                    <!-- <div id="ControlContainer"> -->
                        <!-- <button id="Calling">呼びかけ</button> -->
                    <!-- </div> -->
                </div>
            </div>
            <div class="container">
                <div class="log-mode-buttons">
                    <button id="readingCheckModeBtn" class="active">音声読み上げ確認モード</button>
                    <button id="speechLogModeBtn">発言ログモード</button>
                </div>

                <div class="log-section" id="logArea"></div>
            </div>
    </div>

        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
        <script src="main.js"></script>
        <script src="scale-manager.js"></script>
    </body>
</html>
